<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surprise Generator | @smss1708</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Dancing+Script:wght@700&display=swap');
        
        body {
            background: radial-gradient(circle at center, #1a002a 0%, #000000 100%);
            font-family: 'Poppins', sans-serif;
            color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
        }

        .insta-tag {
            position: fixed; top: 15px; width: 100%; text-align: center;
            font-weight: 700; color: #ff00cc; letter-spacing: 2px;
            text-shadow: 0 0 10px #ff00cc; z-index: 100; font-size: 0.9rem;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
            width: 100%; max-width: 420px;
        }

        .neon-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white; outline: none; transition: 0.3s;
        }
        .neon-input:focus { border-color: #ff00cc; box-shadow: 0 0 15px rgba(255, 0, 204, 0.3); }

        .template-card {
            cursor: pointer; transition: 0.3s; background: rgba(255, 255, 255, 0.05);
            border: 2px solid transparent; border-radius: 20px; padding: 15px; text-align: center;
        }
        .template-card.selected {
            border-color: #ff00cc; background: rgba(255, 0, 204, 0.15);
            transform: scale(1.05); box-shadow: 0 0 20px rgba(255, 0, 204, 0.2);
        }

        .generate-btn {
            background: linear-gradient(45deg, #ff00cc, #764ba2);
            font-weight: 700; transition: 0.4s;
        }

        #resultArea { display: none; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="insta-tag">insta - @smss1708</div>

    <div class="glass-card p-8">
        <h1 class="text-3xl font-bold text-center mb-1" style="font-family: 'Dancing Script';">Create a Surprise</h1>
        <p class="text-gray-400 text-center text-[11px] mb-8 tracking-wide uppercase">Made by - @smss1708</p>

        <div class="mb-6">
            <label class="block text-[10px] uppercase tracking-widest text-gray-500 mb-2 ml-1">Person Name</label>
            <input type="text" id="targetName" placeholder="Kiske liye banana hai?" 
                   class="w-full neon-input rounded-2xl p-4 text-lg">
        </div>

        <label class="block text-[10px] uppercase tracking-widest text-gray-500 mb-3 ml-1">Choose Vibe</label>
        <div class="grid grid-cols-2 gap-3 mb-8">
            <div class="template-card" onclick="selectTemplate('birthday.html', this)">
                <span class="text-2xl">🎂</span><p class="text-[10px] mt-1 font-semibold">Birthday</p>
            </div>
            <div class="template-card" onclick="selectTemplate('love.html', this)">
                <span class="text-2xl">💖</span><p class="text-[10px] mt-1 font-semibold">Proposal</p>
            </div>
            <div class="template-card" onclick="selectTemplate('good morning.html', this)">
                <span class="text-2xl">☀️</span><p class="text-[10px] mt-1 font-semibold">Morning</p>
            </div>
            <div class="template-card" onclick="selectTemplate('sorry.html', this)">
                <span class="text-2xl">🙏</span><p class="text-[10px] mt-1 font-semibold">Sorry</p>
            </div>
        </div>

        <button onclick="generateLink()" id="mainBtn" class="generate-btn w-full py-4 rounded-2xl text-lg mb-2">
            Generate Magical Link ✨
        </button>

        <div id="resultArea">
            <div class="bg-black/40 p-4 rounded-2xl border border-pink-500/30">
                <p class="text-[9px] text-pink-500 font-bold mb-2 tracking-tighter uppercase">Link Ready Hai:</p>
                <p id="generatedLink" class="text-gray-200 text-[11px] break-all font-mono bg-white/5 p-2 rounded-lg"></p>
                <button onclick="copyLink()" class="w-full mt-3 py-2 bg-white/10 rounded-xl text-xs font-semibold">
                    Copy Link 📋
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- YOUR REAL FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyCB-631vxXfLP-Cnnc3jTf7zz_kha8g8qk",
            authDomain: "sivasinghh.firebaseapp.com",
            databaseURL: "https://sivasinghh-default-rtdb.firebaseio.com",
            projectId: "sivasinghh",
            storageBucket: "sivasinghh.appspot.com",
            messagingSenderId: "354573092432",
            appId: "1:354573092432:web:d8f8672b220a80b6fe3355"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let selectedFile = "";

        function selectTemplate(file, element) {
            selectedFile = file;
            document.querySelectorAll('.template-card').forEach(c => c.classList.remove('selected'));
            element.classList.add('selected');
        }

        function generateLink() {
            const name = document.getElementById('targetName').value.trim();
            if(!name || !selectedFile) { alert("Naam likho aur Vibe choose karo!"); return; }

            const uniqueId = "smss-" + Math.random().toString(36).substr(2, 7);
            
            db.ref("dynamic_links/" + uniqueId).set({
                targetName: name,
                template: selectedFile,
                timestamp: Date.now()
            }).then(() => {
                const currentUrl = window.location.href.split('index.html')[0];
                const finalLink = currentUrl + selectedFile + "?id=" + uniqueId;
                
                document.getElementById('generatedLink').innerText = finalLink;
                document.getElementById('resultArea').style.display = 'block';
            }).catch((err) => {
                alert("Firebase Error: " + err.message);
            });
        }

        function copyLink() {
            const linkText = document.getElementById('generatedLink').innerText;
            navigator.clipboard.writeText(linkText).then(() => {
                alert("Copy ho gaya! Send kar do 🚀");
            });
        }
    </script>
</body>
</html>
